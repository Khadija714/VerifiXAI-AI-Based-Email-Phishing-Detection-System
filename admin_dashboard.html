<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard AI Phishing Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

    <style>
        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #0f2040;
            --bg-card: #112244;
            --border: #1a3d6b;
            --accent-teal: #2ab5c0;
            --accent-teal-bright: #00e5cc;
            --accent-purple: #7b5ea7;
            --text-body: #b0cce0;
            --text-heading: #00d4bb;
            --text-white: #e8f4f8;
            --gradient: linear-gradient(135deg, #2ab5c0 0%, #7b5ea7 60%, #00e5cc 100%);
            --sidebar-gradient: linear-gradient(180deg, #0a1f3d 0%, #0d2a50 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-primary);
            display: flex;
            min-height: 100vh;
            width: 100%;
            color: var(--text-body);
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar-gradient);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            min-height: 100vh;
            transition: width 0.3s ease;
            overflow: hidden;
            border-right: 1px solid rgba(42, 181, 192, 0.15);
        }

        .sidebar.collapsed { width: 60px; }

        .sidebar.collapsed .sidebar-brand p,
        .sidebar.collapsed .admin-name,
        .sidebar.collapsed .role-badge,
        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .logout-text { display: none; }

        .sidebar.collapsed .nav-item { justify-content: center; padding: 12px 0; }
        .sidebar.collapsed .admin-avatar { margin: 10px auto; }
        .sidebar.collapsed .sidebar-profile { padding: 10px 0; }
        .sidebar.collapsed .sidebar-brand { justify-content: center; padding: 15px 0; }
        .sidebar.collapsed .brand-text { display: none; }

        .sidebar-brand {
            padding: 16px 18px;
            border-bottom: 1px solid rgba(42, 181, 192, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: space-between;
        }

        .brand-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, rgba(42,181,192,0.25), rgba(123,94,167,0.25));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            border: 1px solid rgba(42,181,192,0.2);
        }

        .brand-text h2 { font-size: 14px; font-weight: 700; color: var(--text-heading); }
        .brand-text p { font-size: 10px; opacity: 0.7; margin-top: 1px; color: var(--text-body); }

        .toggle-sidebar-btn {
            background: rgba(42, 181, 192, 0.15);
            border: none;
            color: var(--text-white);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .toggle-sidebar-btn:hover { background: rgba(42, 181, 192, 0.30); }

        .sidebar-profile {
            padding: 16px 18px;
            border-bottom: 1px solid rgba(42, 181, 192, 0.15);
            text-align: center;
        }

        .admin-avatar {
            width: 56px;
            height: 56px;
            background: rgba(42, 181, 192, 0.15);
            border-radius: 50%;
            border: 2px solid rgba(42, 181, 192, 0.40);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 8px;
            overflow: hidden;
        }

        .admin-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .admin-name { font-size: 14px; font-weight: 600; color: var(--text-white); }

        .role-badge {
            display: inline-block;
            background: var(--gradient);
            color: #0a1628;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
        }

        .notif-bell-btn {
            background: rgba(42, 181, 192, 0.15);
            border: none;
            color: var(--text-white);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 0.2s;
            position: relative;
            margin: 6px auto 0;
        }

        .notif-bell-btn:hover { background: rgba(42, 181, 192, 0.30); }

        .notif-bell-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            background: #f72585;
            color: white;
            font-size: 8px;
            font-weight: 700;
            min-width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 2px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 8px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-body);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .nav-item i { font-size: 15px; width: 18px; flex-shrink: 0; }

        .nav-item:hover {
            background: rgba(42, 181, 192, 0.12);
            color: var(--accent-teal-bright);
        }

        .nav-item.active {
            background: rgba(42, 181, 192, 0.18);
            color: var(--accent-teal-bright);
            border-left: 3px solid var(--accent-teal-bright);
            padding-left: 9px;
        }

        .sidebar-footer { padding: 10px 10px 16px; }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background: rgba(42, 181, 192, 0.10);
            color: var(--text-body);
            border: 1px solid rgba(42, 181, 192, 0.25);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.20);
            border-color: #dc3545;
            color: #ff6b8a;
        }

        .main {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            padding: 26px;
            background: var(--bg-primary);
        }

        .main-content {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            padding: 26px;
            background: var(--bg-primary);
        }

        .nav-item img,
        .sidebar-brand img,
        .notif-bell-btn img,
        .refresh-btn img { object-fit: contain; }

        .stat-icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon img { width: 28px; height: 28px; object-fit: contain; }
        .stat-icon i, .stat-icon span { font-size: 26px; }

        .sidebar.collapsed .nav-item img { margin: 0 auto; }

        .logout-btn img { width: 14px; height: 14px; margin-right: 6px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 26px;
            color: var(--text-heading);
            font-weight: 700;
        }

        .page-header p { color: var(--text-body); font-size: 13px; margin-top: 4px; }

        .refresh-btn {
            padding: 10px 20px;
            background: var(--gradient);
            color: #0a1628;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 16px rgba(42,181,192,0.25);
        }

        .refresh-btn:hover {
            box-shadow: 0 6px 22px rgba(0,229,204,0.35);
            transform: translateY(-1px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 3px 20px rgba(0,0,0,0.25);
            border: 1px solid rgba(42, 181, 192, 0.12);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(42,181,192,0.18);
            border-color: rgba(42,181,192,0.28);
        }

        .stat-info h3 { font-size: 13px; color: var(--text-body); margin-bottom: 5px; }

        .stat-number { font-size: 28px; font-weight: 700; color: var(--text-heading); }

        .stat-sub { font-size: 12px; color: var(--accent-teal); margin-top: 3px; }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 3px 20px rgba(0,0,0,0.25);
            border: 1px solid rgba(42, 181, 192, 0.12);
        }

        .chart-card h3 { font-size: 16px; color: var(--text-heading); margin-bottom: 20px; font-weight: 600; }

        .chart-container { height: 250px; position: relative; }

        .activity-card {
            background: var(--bg-secondary);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 3px 20px rgba(0,0,0,0.25);
            border: 1px solid rgba(42, 181, 192, 0.12);
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-header h3 { font-size: 16px; color: var(--text-heading); font-weight: 600; }

        .view-all {
            color: var(--accent-teal-bright);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        table { width: 100%; border-collapse: collapse; }

        table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--accent-teal);
            font-size: 12px;
            font-weight: 600;
            border-bottom: 2px solid rgba(42,181,192,0.15);
            text-transform: uppercase;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid rgba(42,181,192,0.08);
            font-size: 13px;
            color: var(--text-body);
        }

        table tr:last-child td { border-bottom: none; }

        table tr:hover td { background: rgba(42,181,192,0.05); }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-danger { background: rgba(220,53,69,0.18); color: #ff6b8a; }
        .badge-success { background: rgba(40,167,69,0.18); color: #4ade80; }
        .badge-warning { background: rgba(255,193,7,0.18); color: #fbbf24; }

        .loading { text-align: center; padding: 30px; color: var(--text-body); opacity: 0.6; }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(42,181,192,0.2);
            border-top: 3px solid var(--accent-teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .sidebar-brand p,
        .sidebar.collapsed .admin-name,
        .sidebar.collapsed .role-badge { display: none; }
    </style>
</head>

<script src="theme.js"></script>

<script>
    function nav(url) { window.location.href = url; }
    function adminLogout() { localStorage.removeItem('admin'); localStorage.removeItem('adminLoggedIn'); window.location.href = 'admin_login.html'; }
    function checkAdminAuth() {
        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || admin.role !== 'admin') { window.location.href = 'admin_login.html'; return null; }
        if (document.getElementById('adminName')) document.getElementById('adminName').textContent = admin.username || 'admin';
        return admin;
    }

    const API = 'http://localhost:8000';
    let scansChart, riskChart;

    function checkAdminAuth() {
        const admin = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!admin || admin.role !== 'admin') { window.location.href = 'admin_login.html'; }
        document.getElementById('adminName').textContent = admin.username || 'Administrator';
        return admin;
    }

    function adminLogout() {
        if (confirm('Logout from admin panel?')) {
            localStorage.removeItem('admin');
            window.location.href = 'admin_login.html';
        }
    }

    async function loadDashboard() {
        const admin = checkAdminAuth();
        if (!admin || !admin.access_token) { window.location.href = 'admin_login.html'; return; }
        const headers = { 'Authorization': `Bearer ${admin.access_token}` };

        try {
            const statsRes = await fetch(`${API}/api/admin/stats`, { headers });
            if (statsRes.status === 401) {
                localStorage.removeItem('admin');
                alert('Session expired. Please login again.');
                window.location.href = 'admin_login.html';
                return;
            }
            const statsData = await statsRes.json();
            if (statsData.success) { renderStats(statsData.stats); }

            const analyticsRes = await fetch(`${API}/api/admin/analytics`, { headers });
            const analyticsData = await analyticsRes.json();
            if (analyticsData.success) { renderCharts(analyticsData.analytics); }

            const scansRes = await fetch(`${API}/api/admin/scans?limit=5`, { headers });
            const scansData = await scansRes.json();
            if (scansData.success) { renderRecentScans(scansData.scans); }

            const usersRes = await fetch(`${API}/api/admin/users?limit=5`, { headers });
            const usersData = await usersRes.json();
            if (usersData.success) { renderRecentUsers(usersData.users); }

            document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        } catch (error) {
            console.error('Dashboard load error:', error);
            document.getElementById('statsGrid').innerHTML = '<div class="loading" style="color:#ff6b8a"> Cannot connect to backend. Make sure it is running.</div>';
        }
    }

    function renderStats(stats) {
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(42,181,192,0.15);border:1px solid rgba(42,181,192,0.2)">
                    <img src="C:\\Users\\fiaaa\\Desktop\\phishing_detection_system\\UI\\images\\stat-u.png" alt="users" style="width: 32px; height: 32px; object-fit: contain;">
                </div>
                <div class="stat-info">
                    <h3>Total Users</h3>
                    <div class="stat-number">${stats.total_users}</div>
                    <div class="stat-sub">${stats.active_users_today} active today</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(255,107,138,0.15);border:1px solid rgba(255,107,138,0.2)">
                    <img src="C:\\Users\\fiaaa\\Desktop\\phishing_detection_system\\UI\\images\\scan.png" alt="scans" style="width: 28px; height: 28px;">
                </div>
                <div class="stat-info">
                    <h3>Total Scans</h3>
                    <div class="stat-number">${stats.total_scans}</div>
                    <div class="stat-sub">${stats.today_scans} today</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(255,107,138,0.15);border:1px solid rgba(255,107,138,0.2)">
                    <img src="C:\\Users\\fiaaa\\Desktop\\phishing_detection_system\\UI\\images\\phishing.png" alt="phishing" style="width: 28px; height: 28px;">
                </div>
                <div class="stat-info">
                    <h3>Phishing Detected</h3>
                    <div class="stat-number">${stats.phishing_detected}</div>
                    <div class="stat-sub">${stats.total_scans > 0 ? ((stats.phishing_detected / stats.total_scans) * 100).toFixed(1) : 0}% of scans</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.2)">
                    <img src="C:\\Users\\fiaaa\\Desktop\\phishing_detection_system\\UI\\images\\safe-email (1).png" alt="safe" style="width: 28px; height: 28px;">
                </div>
                <div class="stat-info">
                    <h3>Safe Emails</h3>
                    <div class="stat-number">${stats.safe_emails}</div>
                    <div class="stat-sub">${stats.total_scans > 0 ? ((stats.safe_emails / stats.total_scans) * 100).toFixed(1) : 0}% of scans</div>
                </div>
            </div>
        `;
    }

    function renderCharts(analytics) {
        const daily = analytics.daily_scans || [];
        const labels = daily.map(d => d.date ? new Date(d.date).toLocaleDateString('en', { month: 'short', day: 'numeric' }) : '');
        const phishing = daily.map(d => d.phishing || 0);
        const safe = daily.map(d => d.safe || 0);

        if (scansChart) scansChart.destroy();
        scansChart = new Chart(document.getElementById('scansChart'), {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { label: 'Phishing', data: phishing, borderColor: '#ff6b8a', backgroundColor: 'rgba(255,107,138,0.12)', tension: 0.4, fill: true },
                    { label: 'Safe', data: safe, borderColor: '#00e5cc', backgroundColor: 'rgba(0,229,204,0.12)', tension: 0.4, fill: true }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(42,181,192,0.08)' }, ticks: { color: '#b0cce0' } },
                    x: { grid: { color: 'rgba(42,181,192,0.08)' }, ticks: { color: '#b0cce0' } }
                },
                plugins: { legend: { labels: { color: '#b0cce0' } } }
            }
        });

        const riskDist = analytics.risk_distribution || [];
        const riskLabels = riskDist.map(r => (r.risk_level || 'unknown').toUpperCase());
        const riskData = riskDist.map(r => r.count || 0);
        const riskColors = riskLabels.map(l => l === 'HIGH' ? '#ff6b8a' : l === 'MEDIUM' ? '#fbbf24' : '#00e5cc');

        if (riskChart) riskChart.destroy();
        riskChart = new Chart(document.getElementById('riskChart'), {
            type: 'doughnut',
            data: { labels: riskLabels, datasets: [{ data: riskData, backgroundColor: riskColors, borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#b0cce0' } } } }
        });
    }

    function renderRecentScans(scans) {
        if (!scans || scans.length === 0) {
            document.getElementById('recentScans').innerHTML = '<div class="loading">No scans yet</div>';
            return;
        }
        let html = `<table><thead><tr>
            <th>User</th><th>Email Preview</th><th>Result</th><th>Confidence</th><th>Date</th>
        </tr></thead><tbody>`;
        scans.forEach(s => {
            const preview = (s.original_text || '').substring(0, 50) + '...';
            const date = s.scan_timestamp ? new Date(s.scan_timestamp).toLocaleDateString() : '-';
            const badgeClass = s.prediction_result === 'phishing' ? 'badge-danger' : 'badge-success';
            html += `<tr>
                <td>${s.user_name || 'Anonymous'}</td>
                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${preview}</td>
                <td><span class="badge ${badgeClass}">${(s.prediction_result || '').toUpperCase()}</span></td>
                <td>${s.confidence_score ? s.confidence_score.toFixed(1) + '%' : '-'}</td>
                <td>${date}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('recentScans').innerHTML = html;
    }

    function renderRecentUsers(users) {
        if (!users || users.length === 0) {
            document.getElementById('recentUsers').innerHTML = '<div class="loading">No users yet</div>';
            return;
        }
        let html = `<table><thead><tr>
            <th>ID</th><th>Username</th><th>Email</th><th>Total Scans</th><th>Joined</th>
        </tr></thead><tbody>`;
        users.forEach(u => {
            const date = u.created_at ? new Date(u.created_at).toLocaleDateString() : '-';
            html += `<tr>
                <td>#${u.user_id}</td>
                <td>${u.user_name}</td>
                <td>${u.email}</td>
                <td>${u.total_scans || 0}</td>
                <td>${date}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('recentUsers').innerHTML = html;
    }

    window.onload = () => { checkAdminAuth(); loadDashboard(); };
</script>

<script>
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('collapsed');
        localStorage.setItem('adminSidebarCollapsed', sb.classList.contains('collapsed'));
    }
    (function () {
        if (localStorage.getItem('adminSidebarCollapsed') === 'true')
            document.getElementById('sidebar').classList.add('collapsed');
    })();
</script>
<script>
    (function () {
        const collapsed = localStorage.getItem('adminSidebarCollapsed') === '1';
        if (collapsed) {
            const sb = document.getElementById('adminSidebar');
            if (sb) sb.classList.add('collapsed');
        }
    })();
</script>
<script>
    function nav(url) { window.location.href = url; }
    function adminLogout() { localStorage.removeItem('admin'); localStorage.removeItem('adminLoggedIn'); window.location.href = 'admin_login.html'; }
    function checkAdminAuth() {
        const a = JSON.parse(localStorage.getItem('admin') || 'null');
        if (!a || a.role !== 'admin') { window.location.href = 'admin_login.html'; return null; }
        if (document.getElementById('adminName')) document.getElementById('adminName').textContent = a.username || 'admin';
        return a;
    }
    function toggleAdminSidebar() { const sb = document.getElementById('adminSidebar'); sb.classList.toggle('collapsed'); localStorage.setItem('adminSidebarCollapsed', sb.classList.contains('collapsed') ? '1' : '0'); }
    function initAdminSidebar() {
        if (localStorage.getItem('adminSidebarCollapsed') === '1') {
            const sb = document.getElementById('adminSidebar');
            if (sb) sb.classList.add('collapsed');
        }
        const saved = localStorage.getItem('adminAvatar');
        const div = document.getElementById('sidebarAvatarDiv');
        if (saved && div) div.innerHTML = '<img src="' + saved + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
    }
    window.addEventListener('DOMContentLoaded', initAdminSidebar);
</script>
</body>
